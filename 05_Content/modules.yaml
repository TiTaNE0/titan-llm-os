# 05_Content/modules.yaml — Content Pipeline Registry
#
# Canonical source of truth for which content channels (modules) are active
# and which personalization (voice) is loaded.
#
# Edited directly OR via /enable_module, /disable_module, /set_voice macros.

default_module: twitter

active_modules:
  - twitter
  - linkedin   # Phase E (2026-05-07) — vault-driven posting via anchor_workflow

inactive_modules:
  - video
  - article
  - tiktok    # stub registered 2026-05-17; activate via /enable_module tiktok
  - landing   # stub registered 2026-05-17; activate via /enable_module landing

voice:
  active: voice_evgeny
  path: personalization/voice_evgeny.md   # relative to 05_Content/
