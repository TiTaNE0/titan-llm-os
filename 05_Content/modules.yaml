# 05_Content/modules.yaml — Content Pipeline Registry
#
# Canonical source of truth for which content channels (modules) are active
# and which account is the default for drafting macros.
#
# Voice is per account, single-source. It lives at `accounts/<account>/voice.md`
# and is not tracked here — selecting voice == selecting account.
#
# Edited directly OR via /enable_module, /disable_module macros.

default_module: twitter

active_modules:
  - twitter
  - linkedin   # Phase E (2026-05-07) — vault-driven posting via anchor_workflow
  - tiktok     # activated 2026-05-17; /new_tiktok macro implemented

inactive_modules:
  - video
  - article
  - landing   # stub registered 2026-05-17; activate via /enable_module landing

accounts:
  default: ogrizkov
  # All accounts live under 05_Content/accounts/<handle>/.
  # `default` is used by drafting macros when no `for [[Account]]` override is supplied.
  # To add an account: copy `accounts/_account_template/` to `accounts/<new_handle>/`.
